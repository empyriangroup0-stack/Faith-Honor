<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Faith & Honor | Colección Caballero</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; }
        .hero-section { text-align: center; padding: 80px 20px; border-bottom: 1px solid #333; }
        .hero-section h1 { font-size: 3rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .section-header { text-align: center; padding: 40px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 5px; color: #888; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 10px; max-width: 1400px; margin: auto; padding: 20px; }
        .product { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; text-align: center; transition: 0.4s; }
        .product:hover { border-color: #fff; }
        .product img { width: 100%; height: 450px; object-fit: contain; cursor: pointer; }
        
        .btn-vender { display: block; background: #fff; color: #000; padding: 15px; text-decoration: none; font-weight: bold; margin-top: 20px; text-transform: uppercase; }
        .btn-vender:hover { background: #ccc; }
    </style>
</head>
<body>

<div class="hero-section">
    <h1>Faith & Honor</h1>
    <p>Premium Urban Wear</p>
</div>

<div class="section-header">Colección Caballero: Oversize Edition</div>

<div class="gallery" id="men-section">
    <!-- Aquí aparecerán tus fotos -->
</div>

<script>
    const num = "584120000000"; // CAMBIA TU NÚMERO AQUÍ
    const fotos = [
        {img: "https://i.postimg.cc/nMqSVr9w/1000812563.jpg", nombre: "Kobe Edition"},
        {img: "https://i.postimg.cc/QVcYNCKP/1000812564.jpg", nombre: "LeBron Impact"},
        {img: "https://i.postimg.cc/rKcnDT59/1000812565.jpg", nombre: "Nike Box Air"},
        {img: "https://i.postimg.cc/JtjY70Hv/1000812566.jpg", nombre: "Kings Gold Edition"},
        {img: "https://i.postimg.cc/jLKgDTzr/1000849621.jpg", nombre: "Urban Gradient"},
        {img: "https://i.postimg.cc/xcYxXQKY/1000849622.jpg", nombre: "Who Loves You"},
        {img: "https://i.postimg.cc/1fPC8SpQ/1000849620.jpg", nombre: "LeBron Vintage"},
        {img: "https://i.postimg.cc/mtRXP47J/1000849619.jpg", nombre: "Classic Navy"}
    ];

    const galeria = document.getElementById('men-section');
    fotos.forEach(p => {
        galeria.innerHTML += `
            <div class="product">
                <img src="${p.img}" alt="${p.nombre}">
                <h3 style="margin-top:20px;">${p.nombre}</h3>
                <p style="color:#666;">Tela Peruana Premium</p>
                <a href="https://wa.me/${num}?text=Hola, quiero información del modelo ${p.nombre}" class="btn-vender">Consultar / Vender</a>
            </div>
        `;
    });
</script>

</body>
</html>
